<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Volkswagen - VAG Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>VOLKSWAGEN</h1>
  <p><a href="index.html" style="color: #aaa; text-decoration: none;">← Înapoi la Showroom</a></p>
</header>

<div class="container">

<div class="model-card" onclick="window.location.href='golf.html'">
  <img src="golf.png" alt="Golf">
  <div class="model-info">
    <h3>Golf</h3>
    <p>Legendarul compact city car cu design atemporral</p>
    <span class="badge">Compact</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='passat.html'">
  <img src="passat.png" alt="Passat">
  <div class="model-info">
    <h3>Passat</h3>
    <p>Sedanul premium cu confort și tehnologie de top</p>
    <span class="badge">Sedan</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='tiguan.html'">
  <img src="tiguan.png" alt="Tiguan">
  <div class="model-info">
    <h3>Tiguan</h3>
    <p>SUV-ul versatil perfect pentru familie</p>
    <span class="badge">SUV</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='id4.html'">
  <img src="id4.png" alt="ID.4">
  <div class="model-info">
    <h3>ID.4</h3>
    <p>Viitorul electric cu autonomie până la 500km</p>
    <span class="badge">Electric</span>
  </div>
</div>

</div>

</body>
</html>
