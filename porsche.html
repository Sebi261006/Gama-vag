<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Porsche - VAG Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>PORSCHE</h1>
  <p><a href="index.html" style="color: #aaa; text-decoration: none;">← Înapoi la Showroom</a></p>
</header>

<div class="container">

<div class="model-card" onclick="window.location.href='911.html'">
  <img src="911.png" alt="911">
  <div class="model-info">
    <h3>911</h3>
    <p>Legenda vieții - sportcar iconic cu 70 de ani de istorie</p>
    <span class="badge">Sport Legend</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='cayenne.html'">
  <img src="cayenne.png" alt="Cayenne">
  <div class="model-info">
    <h3>Cayenne</h3>
    <p>SUV-ul sportiv cu performanță și lux</p>
    <span class="badge">Sport SUV</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='panamera.html'">
  <img src="https://images.unsplash.com/photo-1614162692292-7ac56d7f7f1e?auto=format&fit=crop&w=800&q=80" alt="Panamera">
  <div class="model-info">
    <h3>Panamera</h3>
    <p>Sedan sport ultra-rapid și luxos</p>
    <span class="badge">Super Sedan</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='taycan.html'">
  <img src="taican.png" alt="Taycan">
  <div class="model-info">
    <h3>Taycan</h3>
    <p>Viitorul electric - sedan sport cu 800V</p>
    <span class="badge">Electric Future</span>
  </div>
</div>

</div>

</html>
