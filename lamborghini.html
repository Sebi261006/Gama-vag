<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8">
  <title>Lamborghini - VAG Showroom</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>LAMBORGHINI</h1>
  <p><a href="index.html" style="color: #aaa; text-decoration: none;">← Înapoi la Showroom</a></p>
</header>

<div class="container">

<div class="model-card" onclick="window.location.href='revuelto.html'">
  <img src="revo.png" alt="Revuelto">
  <div class="model-info">
    <h3>Revuelto</h3>
    <p>Hypercar hybrid cu 1001 CP și design futurist</p>
    <span class="badge">Hybrid Hypercar</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='urus.html'">
  <img src="urus.png" alt="Urus">
  <div class="model-info">
    <h3>Urus</h3>
    <p>Super SUV agresiv și puternic</p>
    <span class="badge">Super SUV</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='huracan.html'">
  <img src="huracan.png" alt="Huracan">
  <div class="model-info">
    <h3>Huracán</h3>
    <p>Supercar legendar - legile fizicii nu se aplică</p>
    <span class="badge">Supercar Legend</span>
  </div>
</div>

<div class="model-card" onclick="window.location.href='revuelto-s.html'">
  <img src="Revuelto S.png" alt="Revuelto S">
  <div class="model-info">
    <h3>Revuelto S</h3>
    <p>Versiunea sport a hypercar-ului hybrid</p>
    <span class="badge">Hybrid Sport</span>
  </div>
</div>

</div>

</body>
</html>
